# Supabase Configuration
# Generated by supabase start. Edit as needed.

[AUTH]
enabled = true
# JWT secret - use a secure random string in production
jwt_secret = "super-secret-jwt-token-with-at-least-32-characters-long"

# Enable Google OAuth
[AUTH.EXTERNAL.GOOGLE]
enabled = true
client_id = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
# Set to true if redirecting from the Supabase Auth UI
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = false

# You can enable other providers the same way:
# [AUTH.EXTERNAL.APPLE]
# enabled = true
# client_id = "..."
# secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_CLIENT_SECRET)"
