<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="logoBlood" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Blood drop -->
  <path d="M30 15 C30 15 5 45 5 60 C5 76 16.2 85 30 85 C43.8 85 55 76 55 60 C55 45 30 15 30 15Z"
        fill="url(#logoBlood)" />
  <!-- Shine on drop -->
  <ellipse cx="23" cy="50" rx="6" ry="12" fill="white" opacity="0.2"
           transform="rotate(-10 23 50)" />
  <!-- Blood Donor text -->
  <text x="75" y="50" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#1F2937">
    Blood Donor
  </text>
  <!-- Network text -->
  <text x="75" y="85" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#6B7280">
    Network
  </text>
  <!-- Tagline -->
  <text x="75" y="108" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#9CA3AF">
    Save Lives, Donate Blood
  </text>
</svg>
